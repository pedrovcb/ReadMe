{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca</title>
    <link rel="stylesheet" href="{% static 'css/profDiciplinaCategoria.css' %}">
</head>
<body>
    <header>
        <h1>Gerenciador de Biblioteca</h1>
        <h2>Bem vindo(a) professor(a)</h2>
    </header>

    <main>
        <section id="categorias">
            <h2>Categorias</h2>
            <input type="text" id="input-categoria" placeholder="Nome da disciplina">
            <button onclick="adicionarCategoria()">Adicionar</button>
            <ul></ul>
        </section>

       <section id="livros">
    <h2>Livros</h2>

    <input type="text" id="input-titulo" placeholder="Título do livro">
    <input type="text" id="input-autor" placeholder="Autor">
    <select id="select-categoria">
        <option value="">Selecione uma categoria</option>
    </select>
    <button onclick="adicionarLivro()">Adicionar livro</button>

    <ul id="lista-livros"></ul>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
    <h2>Indicar Compra de Novo Livro (Acervo)</h2>

    {% if messages %}
        {% for message in messages %}
            <p style="color: {% if message.tags == 'success' %}green{% else %}red{% endif %}; font-weight: bold; margin-bottom: 10px;">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'indicar_livro' %}">
        {% csrf_token %}
        <input type="text" name="titulo" placeholder="Nome do livro sugerido" required>
        <input type="text" name="autor" placeholder="Autor(a) do livro sugerido" required>
        <button type="submit" style="background-color: #27ae60;">Enviar Sugestão de Compra</button>
    </form>
    </section>

    </main>

    <script src="{% static 'js/profCategoria.js' %}"></script>

</body>
</html>
