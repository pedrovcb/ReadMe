{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReadMe — Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

  
    nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 18px 32px;
      background: #f0f0f0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.15rem;
      font-weight: 600;
      color: #111;
      text-decoration: none;
    }

    .logo svg {
      width: 32px;
      height: 32px;
    }


    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px 40px 48px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 400;
      color: #111;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }


    .card {
      background: #d9d9d9;
      border-radius: 20px;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 820px;
      width: 100%;
    }


    .row {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 560px;
    }


    .field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    input {
      width: 100%;
      padding: 14px 22px;
      border-radius: 50px;
      border: none;
      background: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      color: #333;
      outline: none;
      transition: box-shadow 0.2s;
    }

    input::placeholder { color: #999; }

    input:focus {
      box-shadow: 0 0 0 2px #111;
    }


    .input-full {
      width: 100%;
      max-width: 560px;
    }


    .erro {
      color: #c0392b;
      font-size: 0.85rem;
      text-align: center;
      background: #fde8e8;
      border-radius: 8px;
      padding: 8px 16px;
      width: 100%;
      max-width: 560px;
    }


    .btn {
      margin-top: 8px;
      width: 100%;
      max-width: 560px;
      padding: 15px;
      border-radius: 50px;
      border: none;
      background: #111;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover  { background: #333; }
    .btn:active { transform: scale(0.98); }


    .login-link {
      margin-top: 4px;
      font-size: 0.88rem;
      color: #555;
    }

    .login-link a {
      color: #111;
      font-weight: 600;
      text-decoration: none;
    }

    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a href="{% url 'menu' %}" class="logo">
      <!-- ícone ReadMe inline (coruja) -->
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="23" stroke="#111" stroke-width="2"/>
        <path d="M14 30 Q24 18 34 30" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="18" cy="22" r="3" fill="#111"/>
        <circle cx="30" cy="22" r="3" fill="#111"/>
        <path d="M22 26 L24 29 L26 26" stroke="#111" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ReadMe
    </a>
  </nav>

  <main>
    <h1>Cadastro</h1>

    <div class="card">

      {% if erro %}
        <p class="erro">{{ erro }}</p>
      {% endif %}

      <form method="POST" action="{% url 'cadastro' %}" style="display:contents;">
        {% csrf_token %}

        <!-- Nome completo -->
        <input class="input-full" type="text" name="nome" placeholder="Nome completo" required />

        <!-- Email + Matrícula -->
        <div class="row">
          <div class="field">
            <input type="email" name="email" placeholder="E-mail" required />
          </div>
          <div class="field">
            <input type="text" name="matricula" placeholder="Matrícula" required />
          </div>
        </div>

        <!-- Usuário -->
        <input class="input-full" type="text" name="usuario" placeholder="Usuário" required />

        <!-- Senha + Confirmar -->
        <div class="row">
          <div class="field">
            <input type="password" name="senha" placeholder="Senha" required />
          </div>
          <div class="field">
            <input type="password" name="confirmar_senha" placeholder="Confirmar senha" required />
          </div>
        </div>

        <button type="submit" class="btn">Criar conta</button>
      </form>

      <p class="login-link">Já tem conta? <a href="{% url 'login' %}">Entrar</a></p>

    </div>
  </main>

</body>
</html>
