# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy

name: Build and deploy Python app to Azure Web App - readme

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: ./project
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Create deployment package
        run: |
          cd project
          zip -r ../release.zip . \
            -x ".env" \
            -x "db.sqlite3" \
            -x "staticfiles/*" \
            -x "media/*" \
            -x "capas/*" \
            -x "__pycache__/*" \
            -x "*.pyc" \
            -x "antenv/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_36CEEF6FBB10469F8C314DE1C939606F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E3A0FF7F65494C74A76E3BDE9D4C0070 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_99E3F240E67A4B9DB052AE7E24A5B894 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'readme'
          slot-name: 'Production'
          package: release.zip
